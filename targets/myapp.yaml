name: myapp
github:
  owner: bakparkbj
  repo: myapp
  default_branch: main
local:
  clone_path: ~/dev/myapp
inputs_dir: inputs/myapp
labels:
  prefix: ""
notifier:
  channel: none
  webhook_or_id: DISCORD_WEBHOOK_MYAPP
dev_concurrency: 3
stale_threshold_minutes: 60
verification:
  # Caller-side deterministic verification commands (RGC-VERIFICATION).
  # Executed by application/verification_runner.sh inside the unit workspace
  # before the agent prompt is assembled. Default ["true"] means PASS.
  commands: ["true"]
enabled: true
